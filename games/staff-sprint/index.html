<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Sprint — Key Change</title>
  <meta name="description" content="Race the clock to name notes on the staff before your streak breaks.">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a class="back-link" href="../../index.html">&larr; Back to gallery</a>

  <main class="game" id="game">

    <!-- Top stat bar -->
    <div class="topbar">
      <div class="topbar__stats">
        <span class="stat"><span class="stat__label">Score</span><span class="stat__value" id="score-value">0</span></span>
        <span class="stat"><span class="stat__label">Streak</span><span class="stat__value" id="streak-value">0</span></span>
      </div>

      <div class="topbar__lives" id="lives" aria-label="Lives remaining" role="img">
        <span class="heart" data-life="1">&#9829;</span>
        <span class="heart" data-life="2">&#9829;</span>
        <span class="heart" data-life="3">&#9829;</span>
      </div>

      <div class="topbar__right">
        <button type="button" class="icon-btn" id="mute-btn" aria-pressed="false" aria-label="Mute sound">
          <span id="mute-icon">&#128266;</span>
        </button>
        <svg class="timer-ring" viewBox="0 0 40 40" width="34" height="34" aria-hidden="true">
          <circle class="timer-ring__bg" cx="20" cy="20" r="16"></circle>
          <circle class="timer-ring__arc" id="timer-arc" cx="20" cy="20" r="16"></circle>
        </svg>
      </div>
    </div>

    <!-- Streak banner -->
    <div class="banner" id="streak-banner" aria-live="polite"></div>

    <!-- Center staff area -->
    <div class="stage">
      <div class="stage__svg-wrap">
        <svg id="staff-svg" viewBox="0 0 500 220" role="img" aria-label="Musical staff with a note to identify"></svg>
      </div>
      <div class="floaters" id="floaters" aria-hidden="true"></div>
    </div>

    <!-- Bottom controls -->
    <div class="controls" id="letter-controls" role="group" aria-label="Note name answers">
      <button type="button" class="letter-btn" data-letter="A">A</button>
      <button type="button" class="letter-btn" data-letter="B">B</button>
      <button type="button" class="letter-btn" data-letter="C">C</button>
      <button type="button" class="letter-btn" data-letter="D">D</button>
      <button type="button" class="letter-btn" data-letter="E">E</button>
      <button type="button" class="letter-btn" data-letter="F">F</button>
      <button type="button" class="letter-btn" data-letter="G">G</button>
    </div>

    <!-- Start overlay -->
    <div class="overlay" id="start-overlay">
      <div class="card">
        <h1>Staff Sprint</h1>
        <p class="card__lede">Name the note before time runs out!</p>

        <div class="difficulty-pills" role="group" aria-label="Choose difficulty">
          <button type="button" class="pill is-active" data-difficulty="easy">Easy</button>
          <button type="button" class="pill" data-difficulty="medium">Medium</button>
          <button type="button" class="pill" data-difficulty="hard">Hard</button>
        </div>

        <button type="button" class="btn btn--primary" id="start-btn">Start</button>

        <p class="card__hint">Click a letter, or press A&ndash;G on your keyboard.</p>
      </div>
    </div>

    <!-- Game over overlay -->
    <div class="overlay" id="gameover-overlay" hidden>
      <div class="card">
        <h1>Game Over</h1>
        <p class="new-best-banner" id="new-best-banner" hidden>&#9733; New High Score! &#9733;</p>

        <dl class="results">
          <div class="results__row"><dt>Score</dt><dd id="final-score">0</dd></div>
          <div class="results__row"><dt>Best streak</dt><dd id="final-streak">0</dd></div>
          <div class="results__row"><dt>Notes / min</dt><dd id="final-npm">0</dd></div>
          <div class="results__row results__row--muted"><dt>Best score</dt><dd id="best-score">0</dd></div>
        </dl>

        <button type="button" class="btn btn--primary" id="retry-btn">Play Again</button>
      </div>
    </div>

  </main>

  <script src="game.js"></script>
</body>
</html>
